# Reverse proxy + static host: serves the built PWA and proxies the API.
# One stable LAN URL for the whole app — no separate dev server required.

upstream api_backend {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;  # room for note image/file attachments

    # Compress text responses — includes proxied API JSON.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/css application/javascript application/json
               application/manifest+json image/svg+xml text/plain;

    # --- API ---------------------------------------------------------
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Restore from Backup uploads a full db dump + media archive and the
    # server works for a while before answering — allow both.
    location = /api/v1/admin/restore {
        client_max_body_size 4g;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health { proxy_pass http://api_backend/health; }
    location = /health/ready { proxy_pass http://api_backend/health/ready; }
    location /docs { proxy_pass http://api_backend/docs; }
    location /openapi.json { proxy_pass http://api_backend/openapi.json; }

    # --- Uploaded media (note attachments) ----------------------------
    # Served straight from the shared volume; falls back to the API mount
    # if the file isn't on disk for any reason.
    location /media/ {
        alias /srv/media/;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri @media_api;
    }

    location @media_api {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";
    }

    # --- PWA static files with SPA fallback --------------------------
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Service worker + manifest must always revalidate; a long-cached sw.js
    # would pin users to an old app version.
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, must-revalidate";
        types { } default_type application/manifest+json;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
