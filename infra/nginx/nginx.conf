# Reverse proxy + static host: serves the built PWA and proxies the API.
# One stable LAN URL for the whole app — no separate dev server required.

upstream api_backend {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;  # room for note image/file attachments

    # --- Security headers (apply to every response) ------------------
    # CSP is the primary XSS backstop: scripts/styles same-origin only,
    # no plugins/framing, images from self + data: (inline data URIs) +
    # https: (unfurled link-preview thumbnails). 'unsafe-inline' for
    # style-src is required by React inline styles; scripts stay strict.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compress text responses — includes proxied API JSON.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/css application/javascript application/json
               application/manifest+json image/svg+xml text/plain;

    # --- API ---------------------------------------------------------
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Restore from Backup uploads a full db dump + media archive and the
    # server works for a while before answering — allow both.
    location = /api/v1/admin/restore {
        client_max_body_size 4g;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health { proxy_pass http://api_backend/health; }
    location = /health/ready { proxy_pass http://api_backend/health/ready; }
    location /docs { proxy_pass http://api_backend/docs; }
    location /openapi.json { proxy_pass http://api_backend/openapi.json; }

    # --- Uploaded media (note attachments) ----------------------------
    # ONLY the attachments subtree is web-served — never the whole media
    # volume. Other things live under MEDIA_ROOT (per-user export zips,
    # the VAPID private key) and must stay unreachable; anything not
    # matched here falls through to the SPA and returns index.html, not
    # the file.
    #
    # Uploads are user-controlled: nosniff stops content-type guessing,
    # and a locked-down CSP means a file opened as a top-level document
    # (e.g. a booby-trapped SVG) can't execute script in our origin.
    # <img> rendering is unaffected by a response CSP, so notes still
    # display their images.
    location /media/attachments/ {
        alias /srv/media/attachments/;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; sandbox" always;
        try_files $uri @media_api;
    }

    location @media_api {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; sandbox" always;
    }

    # --- PWA static files with SPA fallback --------------------------
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Service worker + manifest must always revalidate; a long-cached sw.js
    # would pin users to an old app version.
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, must-revalidate";
        types { } default_type application/manifest+json;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        # Repeated here on purpose: an add_header at this location level
        # suppresses inheritance of the server-level headers, so the app's
        # HTML (and the SPA fallback) would otherwise ship with no CSP.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.html;
    }
}
